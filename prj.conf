CONFIG_ASSERT=y
CONFIG_GPIO=y
CONFIG_LED=y

# ---- Shell / Console local (lpuart1 = VCP do ST-Link) ----
CONFIG_SHELL=y
CONFIG_UART_CONSOLE=y

# ---- Comandos nativos do kernel (Requisito 2: info do sistema) ----
# Habilita "kernel threads" (tarefas + runtime), "kernel stacks", "kernel heap"
# (heap livre), "kernel uptime"/"version". O shell e nao-intrusivo (thread
# propria + fila de mensagens).
CONFIG_KERNEL_SHELL=y
CONFIG_THREAD_MONITOR=y
CONFIG_THREAD_NAME=y
CONFIG_INIT_STACKS=y
CONFIG_SYS_HEAP_RUNTIME_STATS=y

# Backend "dummy" do shell: usado pelo CLI que responde comandos vindos
# da ponte do ESP32 pela USART1 (ver src/uart_cli.c).
CONFIG_SHELL_BACKEND_DUMMY=y

# A USART1 (ponte) e lida em modo interrupt-driven / polling.
CONFIG_SERIAL=y
CONFIG_UART_INTERRUPT_DRIVEN=y

# Formatacao de float no snprintk() da telemetria (src/telemetry.c).
CONFIG_CBPRINTF_FP_SUPPORT=y

# ---- Sensor (MPU6050 via I2C) ----
CONFIG_SENSOR=y
CONFIG_MPU6050=y
CONFIG_I2C=y
CONFIG_I2C_STM32=y
# 'i2c scan I2C_1' ajuda a depurar a fiacao do sensor.
CONFIG_I2C_SHELL=y

# ---- Log ----
CONFIG_LOG=y
CONFIG_SENSOR_LOG_LEVEL_DBG=y

# ---- Zbus ----
CONFIG_ZBUS=y

# ---- DSP (FFT / filtro) ----
CONFIG_CMSIS_DSP=y
